<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Market AI Pro - Lista de Compras</title>
    <!-- Tailwind CSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para ícones modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
        }
        .item-card { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        /* Suporte para entalhes de celular (Safe Area) */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>

    <div class="min-h-screen pb-24">
        <!-- Header -->
        <header class="bg-white border-b sticky top-0 z-40 px-6 pt-6 pb-4 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-100">
                        <i data-lucide="sparkles" class="text-white w-5 h-5"></i>
                    </div>
                    <h1 id="header-title" class="text-xl font-black italic uppercase text-slate-900">Geral</h1>
                </div>
                <button onclick="clearChecked()" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                </button>
            </div>
            <!-- Barra de Progresso -->
            <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-600 transition-all duration-500" style="width: 0%"></div>
            </div>
        </header>

        <!-- Filtros de Categoria -->
        <div class="bg-white border-b sticky top-[105px] z-30 py-4 overflow-x-auto scrollbar-hide px-6">
            <div id="category-filters" class="flex gap-2"></div>
        </div>

        <!-- Input de Adição -->
        <div class="p-6">
            <div class="relative group">
                <input id="item-input" type="text" class="w-full pl-6 pr-16 py-5 rounded-3xl border-2 border-slate-100 focus:border-indigo-600 outline-none text-lg font-semibold bg-white transition-all shadow-sm" placeholder="O que comprar?">
                <button id="add-btn" onclick="addItem()" class="absolute right-2 top-2 bottom-2 px-5 bg-indigo-600 text-white rounded-2xl active:scale-95 transition-all flex items-center justify-center">
                    <i data-lucide="plus" id="btn-icon" class="w-6 h-6"></i>
                    <div id="btn-loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </div>
            <p id="ia-status" class="text-[10px] text-slate-400 mt-2 px-2 font-bold uppercase tracking-widest hidden">IA Classificando...</p>
        </div>

        <!-- Lista de Itens -->
        <div id="items-container" class="px-6 space-y-3 pb-10"></div>
    </div>

    <script>
        // Configurações
        const apiKey = ""; 
        let items = JSON.parse(localStorage.getItem('market_ai_v2')) || [];
        let categories = ["Geral", "Hortifruti", "Açougue", "Padaria", "Limpeza", "Bebidas", "Laticínios", "Grãos e Farinhas", "Mercearia"];
        let currentFilter = "Geral";

        // Inicialização imediata (sem splash screen)
        window.addEventListener('DOMContentLoaded', () => {
            refreshCategories();
            renderFilters();
            render();
            lucide.createIcons();
        });

        // Lógica de Inteligência Artificial para Categorização
        async function getAICategory(itemName) {
            const systemPrompt = `Você é um classificador de supermercado.
            REGRAS:
            1. Se o item for Farinha (qualquer tipo), Arroz, Feijão, Grãos ou Massas secas, use "Grãos e Farinhas".
            2. NUNCA coloque farinha em "Mercearia".
            3. Responda apenas o nome da categoria.
            Categorias: Hortifruti, Açougue, Padaria, Limpeza, Bebidas, Laticínios, Grãos e Farinhas, Mercearia.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Classifique este item: ${itemName}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    let category = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Geral";
                    return category.replace(/[.]/g, ''); 
                } catch (e) {
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                }
            }
            return "Geral";
        }

        function refreshCategories() {
            const itemCats = [...new Set(items.map(i => i.category))];
            itemCats.forEach(cat => {
                if (!categories.includes(cat)) categories.push(cat);
            });
        }

        function renderFilters() {
            const filterContainer = document.getElementById('category-filters');
            filterContainer.innerHTML = categories.map(cat => `
                <button onclick="filterBy('${cat}')" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest border-2 transition-all whitespace-nowrap 
                ${currentFilter === cat ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400'}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterBy(cat) {
            currentFilter = cat;
            document.getElementById('header-title').innerText = cat;
            renderFilters();
            render();
        }

        async function addItem() {
            const input = document.getElementById('item-input');
            const btnIcon = document.getElementById('btn-icon');
            const btnLoader = document.getElementById('btn-loader');
            const iaStatus = document.getElementById('ia-status');
            const text = input.value.trim();
            
            if (!text) return;

            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            iaStatus.classList.remove('hidden');
            input.disabled = true;

            const detectedCategory = await getAICategory(text);

            const newItem = {
                id: Date.now(),
                name: text,
                checked: false,
                category: detectedCategory
            };

            items.unshift(newItem);
            
            input.disabled = false;
            input.value = '';
            btnIcon.classList.remove('hidden');
            btnLoader.classList.add('hidden');
            iaStatus.classList.add('hidden');

            refreshCategories();
            renderFilters();
            save();
        }

        function toggleItem(id) {
            items = items.map(i => i.id === id ? {...i, checked: !i.checked} : i);
            save();
        }

        function deleteItem(id) {
            items = items.filter(i => i.id !== id);
            save();
        }

        function clearChecked() {
            items = items.filter(i => !i.checked);
            save();
        }

        function save() {
            localStorage.setItem('market_ai_v2', JSON.stringify(items));
            render();
        }

        function render() {
            const container = document.getElementById('items-container');
            const bar = document.getElementById('progress-bar');
            const filtered = items.filter(i => currentFilter === "Geral" || i.category === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 opacity-20">
                        <i data-lucide="shopping-cart" class="w-16 h-16 mx-auto mb-4"></i>
                        <p class="font-black uppercase tracking-widest text-xs text-slate-900">Lista Vazia</p>
                    </div>
                `;
            } else {
                container.innerHTML = filtered.map(item => `
                    <div class="item-card flex items-center gap-4 p-5 rounded-3xl border-2 transition-all ${item.checked ? 'bg-slate-50 border-transparent opacity-60' : 'bg-white border-white shadow-md'}">
                        <button onclick="toggleItem(${item.id})" class="${item.checked ? 'text-green-500' : 'text-slate-200'}">
                            <i data-lucide="${item.checked ? 'check-circle-2' : 'circle'}" class="w-8 h-8"></i>
                        </button>
                        <div class="flex-1 min-w-0" onclick="toggleItem(${item.id})">
                            <h3 class="font-bold text-lg truncate ${item.checked ? 'line-through text-slate-400' : 'text-slate-700'}">${item.name}</h3>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <span class="text-[9px] font-black uppercase text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded tracking-widest italic flex items-center gap-1">
                                    <i data-lucide="tag" class="w-2 h-2"></i> ${item.category}
                                </span>
                            </div>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="p-2 text-slate-200 hover:text-red-400 transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                `).join('');
            }

            const checkedCount = items.filter(i => i.checked).length;
            bar.style.width = (items.length ? (checkedCount / items.length) * 100 : 0) + '%';
            lucide.createIcons();
        }

        document.getElementById('item-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(); });
    </script>
</body>
</html>

```
