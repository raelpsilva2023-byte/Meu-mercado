```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Mercado - APK Ready</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-color: #F8FAFC;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-loading-bar { animation: loadingBar 5s linear forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes loadingBar { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Plus, Trash2, ShoppingCart, CheckCircle2, Circle, 
            Search, ShoppingBag, Trash, Loader2, Settings, 
            ChevronLeft, X, PlusCircle, Tag 
        } = lucide;

        // Helper para ícones lucide no React via CDN
        const Icon = ({ name, ...props }) => {
            const LucideIcon = lucide[name] || ShoppingBag;
            return <LucideIcon {...props} />;
        };

        const App = () => {
            const [view, setView] = useState('list');
            const [isLoading, setIsLoading] = useState(true);
            const [isClassifying, setIsClassifying] = useState(false);
            const [items, setItems] = useState([]);
            const [categories, setCategories] = useState(["Geral", "Hortifruti", "Açougue", "Padaria", "Limpeza", "Bebidas", "Laticínios"]);
            const [inputValue, setInputValue] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Geral');
            const [searchTerm, setSearchTerm] = useState('');

            const apiKey = ""; // Substitua pela sua chave real se necessário

            useEffect(() => {
                const loadData = async () => {
                    await new Promise(resolve => setTimeout(resolve, 5000));
                    const savedItems = localStorage.getItem('shopping_apk_items');
                    const savedCats = localStorage.getItem('shopping_apk_cats');
                    if (savedItems) setItems(JSON.parse(savedItems));
                    if (savedCats) setCategories(JSON.parse(savedCats));
                    setIsLoading(false);
                };
                loadData();
            }, []);

            useEffect(() => {
                if (!isLoading) {
                    localStorage.setItem('shopping_apk_items', JSON.stringify(items));
                    localStorage.setItem('shopping_apk_cats', JSON.stringify(categories));
                }
            }, [items, categories, isLoading]);

            const classifyItem = async (itemName, currentCategories) => {
                const catList = currentCategories.filter(c => c !== 'Geral').join(', ');
                const prompt = `Analise o item "${itemName}". Se couber em [${catList}], diga o nome dela. Senão, crie uma NOVA categoria curta (máx 2 palavras). Responda apenas o nome.`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'Geral';
                    const clean = rawText.replace(/[^\w\sÀ-ú]/gi, '');
                    return clean.charAt(0).toUpperCase() + clean.slice(1).toLowerCase();
                } catch (e) { return 'Geral'; }
            };

            const addItem = async (e) => {
                e.preventDefault();
                const text = inputValue.trim();
                if (!text) return;
                setIsClassifying(true);
                const suggested = await classifyItem(text, categories);
                
                setCategories(prev => {
                    if (!prev.some(c => c.toLowerCase() === suggested.toLowerCase()) && suggested !== 'Geral') {
                        return [...prev, suggested];
                    }
                    return prev;
                });

                setItems(prev => [{ id: Date.now(), name: text, category: suggested, checked: false }, ...prev]);
                setInputValue('');
                setIsClassifying(false);
            };

            const filteredItems = useMemo(() => {
                return items.filter(i => 
                    i.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
                    (selectedCategory === 'Geral' || i.category === selectedCategory)
                );
            }, [items, searchTerm, selectedCategory]);

            const progress = filteredItems.length ? Math.round((items.filter(i => i.checked).length / items.length) * 100) : 0;

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-12">
                        <div className="relative mb-10">
                            <div className="absolute inset-0 bg-slate-900/10 rounded-full animate-ping scale-150"></div>
                            <div className="bg-slate-900 p-8 rounded-[3rem] relative z-10 shadow-2xl">
                                <Icon name="ShoppingBag" size={56} className="text-white" />
                            </div>
                        </div>
                        <h1 className="text-3xl font-black text-slate-900 uppercase italic mb-4">Meu Mercado</h1>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] animate-pulse">Sincronizando Banco de Dados</p>
                        <div className="fixed bottom-16 left-12 right-12 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-slate-900 animate-loading-bar" />
                        </div>
                    </div>
                );
            }

            if (view === 'settings') {
                return (
                    <div className="min-h-screen bg-slate-50 animate-fade-in">
                        <header className="bg-white p-6 border-b sticky top-0 z-50">
                            <div className="flex items-center gap-4 max-w-md mx-auto">
                                <button onClick={() => setView('list')} className="p-2 text-slate-400"><Icon name="ChevronLeft" size={24} /></button>
                                <h1 className="text-xl font-bold">GESTÃO DE SETORES</h1>
                            </div>
                        </header>
                        <main className="p-6 max-w-md mx-auto space-y-4">
                            {categories.map(cat => (
                                <div key={cat} className="flex items-center justify-between bg-white p-5 rounded-[1.5rem] border shadow-sm">
                                    <span className="font-bold text-slate-700">{cat}</span>
                                    {cat !== 'Geral' && (
                                        <button onClick={() => setCategories(c => c.filter(x => x !== cat))} className="text-slate-200 hover:text-red-500"><Icon name="X" size={20} /></button>
                                    )}
                                </div>
                            ))}
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8FAFC] pb-24 animate-fade-in">
                    <header className="bg-white border-b sticky top-0 z-50 px-6 pt-6 pb-4">
                        <div className="max-w-md mx-auto">
                            <div className="flex justify-between items-center mb-5">
                                <h1 className="text-2xl font-black italic flex items-center gap-2">
                                    <div className="bg-slate-900 p-2 rounded-xl"><Icon name="ShoppingBag" size={20} className="text-white" /></div>
                                    {selectedCategory.toUpperCase()}
                                </h1>
                                <div className="flex gap-1">
                                    <button onClick={() => setView('settings')} className="p-3 text-slate-300"><Icon name="Settings" size={22} /></button>
                                    <button onClick={() => setItems(items.filter(i => !i.checked))} className="p-3 text-slate-300"><Icon name="Trash2" size={22} /></button>
                                </div>
                            </div>
                            <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-600 transition-all duration-1000" style={{ width: `${progress}%` }} />
                            </div>
                        </div>
                    </header>

                    <div className="bg-white border-b sticky top-[117px] z-40 py-4 overflow-x-auto scrollbar-hide px-6">
                        <div className="flex gap-3 max-w-md mx-auto">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} 
                                    className={`px-5 py-2.5 rounded-2xl whitespace-nowrap text-[11px] font-black uppercase tracking-widest border-2 transition-all ${selectedCategory === cat ? 'bg-slate-900 border-slate-900 text-white shadow-xl' : 'bg-white border-slate-100 text-slate-400'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-md mx-auto p-6 space-y-6">
                        <form onSubmit={addItem} className="relative">
                            <input 
                                className="w-full pl-6 pr-16 py-5 rounded-[2rem] border-2 border-slate-100 focus:border-slate-900 outline-none text-lg font-semibold"
                                placeholder="O que comprar?"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                disabled={isClassifying}
                            />
                            <button type="submit" className="absolute right-2.5 top-2.5 bottom-2.5 px-5 bg-slate-900 text-white rounded-[1.5rem] flex items-center justify-center">
                                {isClassifying ? <Icon name="Loader2" size={24} className="animate-spin" /> : <Icon name="Plus" size={28} />}
                            </button>
                        </form>

                        <div className="relative">
                            <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                            <input className="w-full pl-11 py-3.5 rounded-2xl bg-slate-100/40 outline-none text-sm font-semibold" placeholder="Filtrar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>

                        <div className="space-y-3">
                            {filteredItems.map(item => (
                                <div key={item.id} className={`flex items-center gap-4 p-5 rounded-[2rem] border-2 transition-all ${item.checked ? 'bg-slate-50 opacity-60' : 'bg-white shadow-xl shadow-slate-200/30'}`}>
                                    <button onClick={() => setItems(items.map(i => i.id === item.id ? {...i, checked: !i.checked} : i))} className={item.checked ? 'text-green-500' : 'text-slate-200'}>
                                        <Icon name={item.checked ? 'CheckCircle2' : 'Circle'} size={34} />
                                    </button>
                                    <div className="flex-1 min-w-0">
                                        <h3 className={`font-bold text-lg truncate ${item.checked ? 'line-through text-slate-400' : ''}`}>{item.name}</h3>
                                        <div className="flex items-center gap-1.5 opacity-50"><Icon name="Tag" size={9} className="text-indigo-600" /><span className="text-[9px] font-black uppercase tracking-widest">{item.category}</span></div>
                                    </div>
                                    <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="text-slate-200"><Icon name="Trash2" size={20} /></button>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
