```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Market AI - Direto ao Ponto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        /* FORÇAR VISIBILIDADE IMEDIATA */
        html, body {
            opacity: 1 !important;
            visibility: visible !important;
            display: block !important;
            background-color: #F8FAFC;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input:focus { ring: 0; outline: none; }
    </style>
</head>
<body class="bg-slate-50">

    <div class="min-h-screen flex flex-col">
        <!-- Cabeçalho Fixo -->
        <header class="bg-white border-b sticky top-0 z-50 px-6 py-4 shadow-sm">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-2 rounded-lg">
                        <i data-lucide="shopping-cart" class="text-white w-5 h-5"></i>
                    </div>
                    <h1 id="header-title" class="text-lg font-extrabold uppercase tracking-tighter text-slate-900">Lista de Compras</h1>
                </div>
                <button onclick="clearChecked()" class="text-slate-400 hover:text-red-500 p-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
            <!-- Barra de Progresso -->
            <div class="mt-4 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-600 transition-all duration-300" style="width: 0%"></div>
            </div>
        </header>

        <!-- Filtros Rápidos -->
        <div class="bg-white border-b sticky top-[73px] z-40 py-3 overflow-x-auto scrollbar-hide px-6 flex gap-2">
            <div id="category-filters" class="flex gap-2">
                <!-- Filtros injetados via JS -->
            </div>
        </div>

        <!-- Input Principal -->
        <div class="p-6">
            <div class="relative group">
                <input id="item-input" type="text" 
                    class="w-full pl-5 pr-14 py-4 rounded-2xl border-2 border-slate-200 focus:border-indigo-600 bg-white text-base font-semibold shadow-sm" 
                    placeholder="Adicionar item...">
                <button onclick="addItem()" class="absolute right-2 top-2 bottom-2 px-4 bg-indigo-600 text-white rounded-xl active:scale-90 transition-transform">
                    <i data-lucide="plus" id="btn-icon"></i>
                    <div id="btn-loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </div>
            <p id="ia-status" class="text-[9px] text-indigo-500 mt-2 font-bold uppercase tracking-widest hidden italic">IA categorizando...</p>
        </div>

        <!-- Listagem de Itens -->
        <div id="items-container" class="px-6 space-y-3 pb-24">
            <!-- Itens aparecem aqui instantaneamente -->
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let items = JSON.parse(localStorage.getItem('market_ai_v3')) || [];
        let categories = ["Geral", "Hortifruti", "Açougue", "Padaria", "Limpeza", "Bebidas", "Laticínios", "Mercearia"];
        let currentFilter = "Geral";

        // Execução Imediata
        function boot() {
            renderFilters();
            render();
            if (window.lucide) lucide.createIcons();
        }

        // Chamar imediatamente sem esperar onload total se possível
        boot();

        async function getAICategory(itemName) {
            const prompt = `Classifica em uma palavra: ${itemName}. Categorias: Hortifruti, Açougue, Padaria, Limpeza, Bebidas, Laticínios, Grãos, Mercearia.`;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Geral";
            } catch (e) { return "Geral"; }
        }

        function renderFilters() {
            const container = document.getElementById('category-filters');
            if (!container) return;
            container.innerHTML = categories.map(cat => `
                <button onclick="filterBy('${cat}')" class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase border-2 transition-all whitespace-nowrap 
                ${currentFilter === cat ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-slate-100 text-slate-400'}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterBy(cat) {
            currentFilter = cat;
            renderFilters();
            render();
        }

        async function addItem() {
            const input = document.getElementById('item-input');
            const val = input.value.trim();
            if (!val) return;

            document.getElementById('btn-icon').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('ia-status').classList.remove('hidden');

            const cat = await getAICategory(val);
            
            items.unshift({ id: Date.now(), name: val, checked: false, category: cat });
            input.value = '';
            
            document.getElementById('btn-icon').classList.remove('hidden');
            document.getElementById('btn-loader').classList.add('hidden');
            document.getElementById('ia-status').classList.add('hidden');
            
            save();
        }

        function toggleItem(id) {
            items = items.map(i => i.id === id ? {...i, checked: !i.checked} : i);
            save();
        }

        function deleteItem(id) {
            items = items.filter(i => i.id !== id);
            save();
        }

        function clearChecked() {
            items = items.filter(i => !i.checked);
            save();
        }

        function save() {
            localStorage.setItem('market_ai_v3', JSON.stringify(items));
            render();
        }

        function render() {
            const container = document.getElementById('items-container');
            const filtered = items.filter(i => currentFilter === "Geral" || i.category.toLowerCase().includes(currentFilter.toLowerCase()));

            container.innerHTML = filtered.length ? filtered.map(item => `
                <div class="flex items-center gap-3 p-4 bg-white rounded-2xl shadow-sm border border-slate-100 transition-all ${item.checked ? 'opacity-50' : ''}">
                    <button onclick="toggleItem(${item.id})" class="text-indigo-600">
                        <i data-lucide="${item.checked ? 'check-square' : 'square'}" class="w-6 h-6"></i>
                    </button>
                    <div class="flex-1 min-w-0" onclick="toggleItem(${item.id})">
                        <p class="font-bold text-slate-800 truncate ${item.checked ? 'line-through' : ''}">${item.name}</p>
                        <span class="text-[9px] font-black text-indigo-500 uppercase tracking-tighter">${item.category}</span>
                    </div>
                    <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('') : `<p class="text-center text-slate-400 py-10 text-xs font-bold uppercase tracking-widest">Nenhum item aqui</p>`;

            const progress = items.length ? (items.filter(i => i.checked).length / items.length) * 100 : 0;
            document.getElementById('progress-bar').style.width = progress + '%';
            
            if (window.lucide) lucide.createIcons();
        }

        document.getElementById('item-input').onkeypress = (e) => e.key === 'Enter' && addItem();
    </script>
</body>
</html>
